name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:  # Allow manual triggering

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
        include:
          # Also test on macOS and Windows with Python 3.11
          - os: macos-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.11"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install statetracker first (poolparty depends on it)
          pip install -e ./statetracker[dev]
          # Install poolparty
          pip install -e ./poolparty[dev]

      - name: Run StateTracker tests
        run: |
          cd statetracker
          pytest tests/ -v --tb=short

      - name: Run PoolParty tests
        run: |
          cd poolparty
          pytest tests/ -v --tb=short

  coverage:
    runs-on: ubuntu-latest
    needs: test  # Only run coverage if tests pass

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./statetracker[dev]
          pip install -e ./poolparty[dev]

      - name: Run tests with coverage (StateTracker)
        run: |
          cd statetracker
          pytest tests/ --cov=statetracker --cov-report=xml --cov-report=term-missing

      - name: Run tests with coverage (PoolParty)
        run: |
          cd poolparty
          pytest tests/ --cov=poolparty --cov-report=xml --cov-report=term-missing

      - name: Upload StateTracker coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./statetracker/coverage.xml
          flags: statetracker
          name: statetracker-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload PoolParty coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./poolparty/coverage.xml
          flags: poolparty
          name: poolparty-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff linter
        run: ruff check . --output-format=github
        continue-on-error: true  # Don't fail CI on lint errors initially

      - name: Run Ruff formatter check
        run: ruff format --check .
        continue-on-error: true  # Don't fail CI on format errors initially

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build StateTracker package
        run: |
          cd statetracker
          python -m build

      - name: Build PoolParty package
        run: |
          cd poolparty
          python -m build

      - name: Check package metadata
        run: |
          twine check statetracker/dist/*
          twine check poolparty/dist/*
